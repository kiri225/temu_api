<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temu API Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <h1>Temu API Playground</h1>
      <div id="config-badge" class="config-badge">加载配置中...</div>
    </div>
    <button id="logout-btn" class="btn-secondary btn-sm btn-logout" type="button" hidden>退出登录</button>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">接口导航</span>
        <input type="search" id="search" class="search-input" placeholder="搜索名称 / type…">
      </div>
      <nav id="api-list" class="api-nav"></nav>
    </aside>

    <main class="workspace">
      <section class="api-bar">
        <div id="api-desc" class="api-desc"></div>

        <div class="api-bar-main">
          <div class="api-type-wrap">
            <label for="api-type">API Type</label>
            <input type="text" id="api-type" placeholder="例如 bg.mall.info.get" spellcheck="false">
          </div>
          <div class="api-bar-actions">
            <button id="send-btn" class="btn-primary" type="button">发送请求</button>
            <button id="format-btn" class="btn-secondary btn-sm" type="button">格式化</button>
            <button id="clear-btn" class="btn-secondary btn-sm" type="button">清空</button>
          </div>
        </div>

        <details class="tools-drawer">
          <summary>示例保存 · 不可用标记</summary>
          <div class="tools-drawer-body">
            <div class="tools-group">
              <span class="tools-label">测试示例</span>
              <button id="refresh-params-btn" class="btn-secondary btn-sm" type="button">从 Body 刷新参数表</button>
              <button id="save-sample-btn" class="btn-primary btn-sm" type="button">保存示例</button>
              <button id="reset-sample-btn" class="btn-secondary btn-sm" type="button">恢复默认</button>
            </div>
            <div class="tools-group">
              <span class="tools-label">不可用</span>
              <input
                type="text"
                id="unavailable-note"
                class="mark-note-input"
                placeholder="备注（可选）"
              >
              <button id="mark-unavailable-btn" class="btn-secondary btn-sm btn-mark-unavailable" type="button">
                标记不可用
              </button>
            </div>
            <p class="tools-hint">示例与备注写入 <code>api-samples.json</code>；不可用标记写入 <code>unavailable.json</code>，重启后保留。</p>
            <div id="sample-save-status" class="sample-save-status" hidden></div>
          </div>
        </details>
      </section>

      <div class="workspace-split">
        <section class="panel panel-notes">
          <header class="panel-head">
            <h2>字段备注</h2>
            <span class="panel-sub">根据 Body 自动生成，可编辑说明</span>
          </header>
          <div class="param-notes-wrap">
            <table class="param-notes-table">
              <thead>
                <tr>
                  <th class="col-expand"></th>
                  <th class="col-path">参数</th>
                  <th class="col-type">类型</th>
                  <th class="col-preview">示例值</th>
                  <th class="col-note">备注</th>
                </tr>
              </thead>
              <tbody id="param-notes-body">
                <tr><td colspan="5" class="empty-hint">选择接口后自动加载；也可编辑 Body 后刷新</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="panel panel-request">
          <header class="panel-head">
            <h2>请求 Body</h2>
            <span class="panel-sub">JSON · Ctrl+Enter 发送</span>
          </header>
          <textarea id="request-body" spellcheck="false" placeholder="{}"></textarea>
        </section>
      </div>

      <section class="panel panel-response">
        <header class="panel-head panel-head-row">
          <div>
            <h2>响应结果</h2>
            <span class="panel-sub">最近一次请求</span>
          </div>
          <span id="meta" class="meta"></span>
        </header>
        <pre id="response" class="response">等待请求…</pre>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
