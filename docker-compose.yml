services:
  temu-playground:
    build: .
    image: temu-go-playground:latest
    container_name: temu-playground
    ports:
      - "${PLAYGROUND_PORT:-8080}:8080"
    volumes:
      - ${TEMU_CONFIG_PATH:-./config/config.json}:/config/config.json:ro
      - ${TEMU_UNAVAILABLE_PATH:-./cmd/playground/unavailable.json}:/data/unavailable.json
      - ${TEMU_SAMPLES_PATH:-./cmd/playground/api-samples.json}:/data/api-samples.json
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PLAYGROUND_AUTH_USER: ${PLAYGROUND_AUTH_USER:-}
      PLAYGROUND_AUTH_PASSWORD: ${PLAYGROUND_AUTH_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
